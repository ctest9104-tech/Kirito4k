<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIRITO4K | PRO</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: -apple-system, sans-serif; }
        nav { padding: 15px 20px; background: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e50914; position: sticky; top: 0; z-index: 100; }
        .logo { color: #e50914; font-weight: 900; font-size: 20px; text-decoration: none; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 15px; }
        .card { background: #111; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; position: relative; }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card-title { font-size: 10px; padding: 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.8; }
        #player { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        .player-bar { padding: 15px; background: #111; display: flex; justify-content: space-between; align-items: center; }
        iframe { flex: 1; border: none; width: 100%; height: 100%; background: #000; }
        .close-btn { background: #e50914; color: white; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; }
        #search { background: #111; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 20px; outline: none; width: 40%; }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo" onclick="location.reload()">KIRITO4K</a>
        <input type="text" id="search" placeholder="Search...">
    </nav>

    <div id="grid"></div>

    <div id="player">
        <div class="player-bar">
            <span id="p-title" style="font-size: 14px; font-weight: bold;">Playing...</span>
            <button class="close-btn" onclick="closePlayer()">✕ CLOSE</button>
        </div>
        <div style="flex: 1; position: relative;">
            <div id="click-guard" onclick="this.style.display='none'" style="position: absolute; inset: 0; z-index: 10; background: transparent;"></div>
            <iframe id="video-frame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const player = document.getElementById('player');
        const iframe = document.getElementById('video-frame');
        const pTitle = document.getElementById('p-title');

        // FALLBACK DATA (If API fails, these will show)
        const emergencyList = [
            { id: "tt15239678", title: "Dune: Part Two", poster: "https://image.tmdb.org/t/p/w500/8uVKf6hadi2jT60p4Fc9p0tQNfs.jpg" },
            { id: "tt1677720", title: "The Batman", poster: "https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T6fujdq.jpg" },
            { id: "tt1011985", title: "Kung Fu Panda 4", poster: "https://image.tmdb.org/t/p/w500/kDp1vUBiR1RQqb6jsYvS7v9p9mS.jpg" },
            { id: "tt1160419", title: "Dune", poster: "https://image.tmdb.org/t/p/w500/d5N0BbxWnTzP3SvcZ0uW9p2zYQO.jpg" },
            { id: "tt0468569", title: "The Dark Knight", poster: "https://image.tmdb.org/t/p/w500/qJ2tW6WMUDr9p1v3CfsP7ksCygq.jpg" },
            { id: "tt1375666", title: "Inception", poster: "https://image.tmdb.org/t/p/w500/edv5CZvRjS99vO6YdvzH073DYpL.jpg" }
        ];

        async function initCatalog(query = '') {
            try {
                // Primary: Try the Mirror API
                const api = query 
                    ? `https://www.omdbapi.com/?apikey=6924b423&s=${query}`
                    : `https://vidsrc.icu/api/trending`;

                const res = await fetch(api);
                const data = await res.json();
                const movies = data.results || data.Search || [];
                
                if (movies.length === 0) throw new Error();
                render(movies);
            } catch (err) {
                // If API fails and no query, show Emergency List
                if (!query) render(emergencyList);
                else grid.innerHTML = "<p style='padding:20px'>No results found.</p>";
            }
        }

        function render(list) {
            grid.innerHTML = list.map(m => {
                const id = m.id || m.imdbID;
                const title = (m.title || m.Title || "Unknown").replace(/'/g, "");
                const poster = m.poster || (m.poster_path ? `https://image.tmdb.org/t/p/w342${m.poster_path}` : m.Poster);
                
                return `
                    <div class="card" onclick="openPlayer('${id}', '${title}')">
                        <img src="${poster || 'https://via.placeholder.com/342x513?text=No+Poster'}">
                        <div class="card-title">${title}</div>
                    </div>
                `;
            }).join('');
        }

        function openPlayer(id, title) {
            pTitle.innerText = title;
            // VidLink is the 2026 leader for ad-free experience
            iframe.src = `https://vidlink.pro/embed/movie/${id}?primaryColor=e50914`;
            player.style.display = 'flex';
            document.getElementById('click-guard').style.display = 'block';
        }

        function closePlayer() {
            player.style.display = 'none';
            iframe.src = '';
        }

        document.getElementById('search').oninput = (e) => initCatalog(e.target.value);
        initCatalog();
    </script>
</body>
</html>
