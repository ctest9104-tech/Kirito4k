<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIRITO4K | FLICK</title>
    <style>
        :root { --red: #e50914; --dark: #050505; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        nav { padding: 1.2rem 5%; background: rgba(0,0,0,0.85); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; backdrop-filter: blur(10px); }
        .logo { color: var(--red); font-weight: 900; font-size: 1.6rem; letter-spacing: -1px; text-decoration: none; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 20px 5%; }
        .movie-card { position: relative; border-radius: 10px; overflow: hidden; cursor: pointer; background: #111; transition: 0.3s; border: 1px solid #1a1a1a; }
        .movie-card:hover { transform: scale(1.05); border-color: var(--red); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .movie-card .info { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); font-size: 0.75rem; font-weight: bold; }
        #search { background: #151515; border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 50px; width: 40%; outline: none; }
        #player { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        .player-bar { padding: 15px 5%; display: flex; justify-content: space-between; background: #111; align-items: center; }
        iframe { flex: 1; border: none; width: 100%; height: 100%; }
        .btn-close { background: var(--red); color: white; border: none; padding: 8px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        @media (max-width: 600px) { #grid { grid-template-columns: repeat(2, 1fr); } #search { width: 130px; } }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo" onclick="location.reload()">KIRITO4K</a>
        <input type="text" id="search" placeholder="Search movies...">
    </nav>

    <div id="grid"></div>

    <div id="player">
        <div class="player-bar">
            <span id="p-title" style="opacity:0.7">...</span>
            <button class="btn-close" onclick="closePlayer()">✕ CLOSE</button>
        </div>
        <iframe id="p-frame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <script>
        const API = 'https://api.themoviedb.org/3';
        const KEY = '315caf36915c58b001e9603899be9670';
        const grid = document.getElementById('grid');
        const iframe = document.getElementById('p-frame');
        const search = document.getElementById('search');

        async function load(q = '') {
            const url = q 
                ? `${API}/search/movie?api_key=${KEY}&query=${encodeURIComponent(q)}`
                : `${API}/movie/popular?api_key=${KEY}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                render(data.results);
            } catch (e) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; opacity:0.5;">Mirror Timeout. Try again in 10s.</div>`;
            }
        }

        function render(movies) {
            grid.innerHTML = movies.map(m => `
                <div class="movie-card" onclick="openPlayer('${m.id}', '${m.title.replace(/'/g, "")}')">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" onerror="this.src='https://via.placeholder.com/500x750?text=KIRITO'">
                    <div class="info">${m.title}</div>
                </div>
            `).join('');
        }

        function openPlayer(id, title) {
            document.getElementById('p-title').innerText = title;
            // The Flickv4 Primary Mirror (No ad-refusal)
            iframe.src = `https://vidlink.pro/embed/movie/${id}?primaryColor=e50914`;
            document.getElementById('player').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            document.getElementById('player').style.display = 'none';
            iframe.src = '';
            document.body.style.overflow = 'auto';
        }

        search.oninput = (e) => load(e.target.value);
        load();
    </script>
</body>
</html>
