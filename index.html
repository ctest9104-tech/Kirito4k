<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIRITO4K | OMNI</title>
    <style>
        :root { --red: #e50914; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow-x: hidden; }
        nav { padding: 15px 5%; background: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 100; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 20px; }
        .card { background: #111; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; border: 1px solid #222; position: relative; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        #player-ui { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        .controls { padding: 10px; background: #111; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; border-bottom: 1px solid #333; }
        .m-btn { background: #222; color: #ccc; border: 1px solid #444; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .m-btn.active { background: var(--red); color: white; border-color: var(--red); }
        iframe { flex: 1; border: none; width: 100%; height: 100%; background: #000; }
        .close { background: #333; color: white; border: none; padding: 5px 15px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <div style="color:var(--red); font-weight:900; font-size:22px;">KIRITO4K</div>
        <input type="text" id="srch" placeholder="Search..." style="background:#111; border:1px solid #333; color:white; padding:8px; border-radius:20px; width:40%;">
    </nav>

    <div id="grid"></div>

    <div id="player-ui">
        <div class="controls" id="mirror-list">
            </div>
        <div style="background:#111; padding:10px; display:flex; justify-content:space-between; align-items:center;">
            <span id="p-title" style="font-size:12px; opacity:0.8;"></span>
            <button class="close" onclick="stop()">✕ CLOSE</button>
        </div>
        <iframe id="main-frame" allowfullscreen></iframe>
    </div>

    <script>
        const KEY = '315caf36915c58b001e9603899be9670';
        let currentId = '';
        let currentSource = 0;

        const mirrors = [
            { name: "VidLink (Fast)", url: (id) => `https://vidlink.pro/embed/movie/${id}` },
            { name: "Vidsrc.to", url: (id) => `https://vidsrc.to/embed/movie/${id}` },
            { name: "Vidsrc.me", url: (id) => `https://vidsrc.me/embed/movie?imdb=${id}` },
            { name: "SuperEmbed", url: (id) => `https://multiembed.mov/?video_id=${id}&tmdb=1` },
            { name: "2Embed", url: (id) => `https://www.2embed.cc/embed/${id}` },
            { name: "StreamNova", url: (id) => `https://streamnova.cc/embed/${id}` },
            { name: "Embed.su", url: (id) => `https://embed.su/embed/movie/${id}` },
            { name: "Vidsrc.pro", url: (id) => `https://vidsrc.pro/embed/movie/${id}` },
            { name: "MoviesAPI", url: (id) => `https://moviesapi.club/movie/${id}` },
            { name: "AutoEmbed", url: (id) => `https://player.vidsrc.nl/embed/movie/${id}` },
            { name: "NoboAds", url: (id) => `https://autoembed.to/movie/tmdb/${id}` }
        ];

        async function load(q = '') {
            const url = q ? `https://api.themoviedb.org/3/search/movie?api_key=${KEY}&query=${q}` : `https://api.themoviedb.org/3/trending/movie/week?api_key=${KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.results.map(m => `
                <div class="card" onclick="play('${m.id}', '${m.title.replace(/'/g,"")}')">
                    <img src="https://image.tmdb.org/t/p/w342${m.poster_path}">
                </div>
            `).join('');
        }

        function play(id, title) {
            currentId = id;
            document.getElementById('p-title').innerText = title;
            document.getElementById('player-ui').style.display = 'flex';
            setMirror(0);
        }

        function setMirror(index) {
            currentSource = index;
            const list = document.getElementById('mirror-list');
            list.innerHTML = mirrors.map((m, i) => `
                <button class="m-btn ${i === index ? 'active' : ''}" onclick="setMirror(${i})">${m.name}</button>
            `).join('');
            document.getElementById('main-frame').src = mirrors[index].url(currentId);
        }

        function stop() {
            document.getElementById('player-ui').style.display = 'none';
            document.getElementById('main-frame').src = '';
        }

        document.getElementById('srch').oninput = (e) => load(e.target.value);
        load();
    </script>
</body>
</html>
