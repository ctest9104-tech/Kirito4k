<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Streamly | Kirito4K Edition</title>
    <style>
        :root { --accent: #e50914; --bg: #050505; --card: #111; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        nav { padding: 1rem 5%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
        .logo { color: var(--accent); font-weight: 800; font-size: 1.5rem; text-decoration: none; letter-spacing: -1px; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; padding: 1.5rem 5%; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; border: 1px solid #222; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card-meta { padding: 10px; font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: linear-gradient(transparent, rgba(0,0,0,0.9)); position: absolute; bottom: 0; width: 100%; }
        #player-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; animation: fadeIn 0.3s ease; }
        .player-header { padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; background: #111; }
        iframe { flex: 1; border: none; width: 100%; height: 100%; }
        .close-btn { background: var(--accent); color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #search-input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 0.6rem 1.2rem; border-radius: 50px; width: 250px; outline: none; transition: 0.3s; }
        #search-input:focus { border-color: var(--accent); width: 300px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 600px) { #grid { grid-template-columns: repeat(2, 1fr); } #search-input { width: 120px; } #search-input:focus { width: 150px; } }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo" onclick="location.reload()">STREAMLY</a>
        <input type="text" id="search-input" placeholder="Search movies...">
    </nav>

    <div id="grid">
        </div>

    <div id="player-overlay">
        <div class="player-header">
            <span id="now-playing" style="font-weight: bold; opacity: 0.8;">...</span>
            <button class="close-btn" onclick="stopVideo()">✕ CLOSE</button>
        </div>
        <iframe id="main-video" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <script>
        const API_KEY = '315caf36915c58b001e9603899be9670';
        const grid = document.getElementById('grid');
        const overlay = document.getElementById('player-overlay');
        const iframe = document.getElementById('main-video');
        const searchInput = document.getElementById('search-input');

        async function fetchContent(query = '') {
            const url = query 
                ? `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}`
                : `https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                render(data.results);
            } catch (e) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; opacity: 0.5;">Mirror connection failed. Try searching specifically.</div>`;
            }
        }

        function render(items) {
            grid.innerHTML = items.map(m => `
                <div class="card" onclick="playVideo('${m.id}', '${m.title.replace(/'/g, "\\'")}')">
                    <img src="https://image.tmdb.org/t/p/w440_and_h660_face${m.poster_path}" alt="${m.title}" onerror="this.src='https://via.placeholder.com/440x660?text=No+Image'">
                    <div class="card-meta">${m.title}</div>
                </div>
            `).join('');
        }

        function playVideo(id, title) {
            document.getElementById('now-playing').innerText = title;
            // VidLink Pro v2 - GitHub's most reliable ad-free mirror in 2026
            iframe.src = `https://vidlink.pro/embed/movie/${id}?primaryColor=e50914&autoplay=false`;
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function stopVideo() {
            overlay.style.display = 'none';
            iframe.src = '';
            document.body.style.overflow = 'auto';
        }

        searchInput.oninput = (e) => fetchContent(e.target.value);
        fetchContent();
    </script>
</body>
</html>
